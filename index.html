<script>
function toggleDarkMode() {
    var isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('tht_darkmode', isDark ? '1' : '0');
    document.getElementById('btn-darkmode').textContent = isDark ? 'LIGHT' : 'DARK';
}
// Restaurer la préférence au chargement
(function() {
    if (localStorage.getItem('tht_darkmode') === '1') {
        document.body.classList.add('dark-mode');
        var btn = document.getElementById('btn-darkmode');
        if (btn) btn.textContent = 'LIGHT';
    }
})();
</script>
